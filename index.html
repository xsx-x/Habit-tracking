<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מעקב הרגלים והישגים - גרסה מלאה ובענן</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @keyframes confetti {
            0% { opacity: 1; transform: translate(0, 0) rotate(0deg); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(720deg); }
        }
        .animate-confetti { animation: confetti forwards ease-out; }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -60px) scale(1.5); }
        }
        .animate-float-up { animation: floatUp 1s ease-out forwards; pointer-events: none; }
        
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            10% { opacity: 1; transform: translate(-50%, 0); }
            90% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, 20px); }
        }
        .animate-toast { animation: slideUpFade 3s ease-in-out forwards; left: 50%; z-index: 1000; }

        .scrollbar-hide::-webkit-scrollbar { height: 6px; width: 6px; }
        .scrollbar-hide::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .dark .scrollbar-hide::-webkit-scrollbar-thumb { background-color: #475569; }
        
        .heatmap-grid { display: grid; grid-template-rows: repeat(7, 1fr); grid-auto-flow: column; gap: 4px; overflow-x: auto; padding-bottom: 10px; }
        .drag-over { border: 2px dashed #6366f1 !important; transform: scale(1.02); }
        
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC] dark:bg-slate-900 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        // ------------------------------------------------------------------------
        // 🔥 הגדרות חיבור לענן (Firebase) 🔥
        // כשתעלה את זה ל-GitHub שלך, החלף את הערכים כאן לאלו שתקבל מ-Firebase!
        // ------------------------------------------------------------------------
        const myFirebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        let app, auth, db;
        let isCloudEnabled = false;
        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'my-habits-app';

        try {
            const configToUse = typeof __firebase_config !== 'undefined' 
                ? JSON.parse(__firebase_config) 
                : (myFirebaseConfig.apiKey !== "YOUR_API_KEY" ? myFirebaseConfig : null);
            
            if (configToUse) {
                app = initializeApp(configToUse);
                auth = getAuth(app);
                db = getFirestore(app);
                isCloudEnabled = true;
            }
        } catch (e) {
            console.error("שגיאה בהפעלת Firebase:", e);
        }

        // --- Helper Functions & Mock Data ---
        const generateMockData = () => {
          const today = new Date();
          const getDateStr = (daysAgo) => {
            const d = new Date(today); d.setDate(d.getDate() - daysAgo); return d.toISOString().split('T')[0];
          };
          const dafYomiLogs = {}; const dafYomiNotes = {};
          for(let i=0; i<45; i++) { if (i !== 5 && i !== 12) dafYomiLogs[getDateStr(i)] = 1; else dafYomiLogs[getDateStr(i)] = -1; }
          dafYomiNotes[getDateStr(1)] = "היה שיעור מרתק בבבא קמא!";
          const walkLogs = {}; for(let i=0; i<10; i++) { if (i < 7) walkLogs[getDateStr(i)] = 1; else walkLogs[getDateStr(i)] = -1; }
          
          return [
            { id: 'mock-1', name: 'לימוד דף היומי', startDate: getDateStr(45), endDate: getDateStr(-300), goalType: 'total', targetDays: 300, logs: dafYomiLogs, notes: dafYomiNotes, isArchived: false },
            { id: 'mock-2', name: 'הליכה יומית', startDate: getDateStr(10), endDate: getDateStr(-20), goalType: 'total', targetDays: 25, logs: walkLogs, notes: {}, isArchived: false }
          ];
        };

        const generateDefaultUsers = () => [{ id: 'user-default', name: 'הפרופיל שלי', avatar: 'fa-user', coins: 150 }];
        const defaultRewards = [
            { id: 'r1', title: 'קניית ספר חדש', cost: 500 },
            { id: 'r2', title: 'שעת מנוחה חופשית', cost: 100 }
        ];

        // --- Sound Effects ---
        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gainNode = ctx.createGain();
                osc.connect(gainNode); gainNode.connect(ctx.destination);
                if(type === 'success') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(659.25, ctx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.1, ctx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
                } else {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(440, ctx.currentTime); osc.frequency.setValueAtTime(554.37, ctx.currentTime + 0.1); osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.15, ctx.currentTime); gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
                    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
                }
            } catch(e) {}
        };

        // --- Components ---
        const VisualGrowthTree = ({ maxStreak }) => {
            let icon = 'fa-seedling'; let color = 'text-slate-400'; let bg = 'bg-slate-100 dark:bg-slate-800';
            let title = 'זרע התחלה'; let size = 'text-3xl'; let glow = '';
            if (maxStreak >= 30) { icon = 'fa-tree'; color = 'text-amber-400'; bg = 'bg-amber-100 dark:bg-amber-900/40'; title = 'עץ זהב מואר!'; size = 'text-6xl'; glow = 'drop-shadow-[0_0_15px_rgba(251,191,36,0.8)]'; }
            else if (maxStreak >= 15) { icon = 'fa-tree'; color = 'text-emerald-600'; bg = 'bg-emerald-100 dark:bg-emerald-900/40'; title = 'עץ חזק ויציב'; size = 'text-5xl'; }
            else if (maxStreak >= 7) { icon = 'fa-tree'; color = 'text-emerald-500'; bg = 'bg-emerald-50 dark:bg-emerald-900/20'; title = 'עץ צומח'; size = 'text-4xl'; }
            else if (maxStreak >= 3) { icon = 'fa-leaf'; color = 'text-green-500'; bg = 'bg-green-50 dark:bg-green-900/20'; title = 'שתיל צעיר'; size = 'text-3xl'; }
            else if (maxStreak >= 1) { icon = 'fa-seedling'; color = 'text-green-400'; bg = 'bg-green-50 dark:bg-green-900/10'; title = 'נבט ראשון'; size = 'text-3xl'; }

            return (
                <div className="flex flex-col items-center justify-center p-4">
                    <div className={`w-24 h-24 rounded-full flex items-center justify-center transition-all duration-1000 ${bg}`}>
                        <i className={`fa-solid ${icon} ${color} ${size} ${glow} transition-all duration-1000 transform hover:scale-110`}></i>
                    </div>
                    <h3 className="mt-3 font-bold text-slate-700 dark:text-slate-200">{title}</h3>
                    <p className="text-sm text-slate-500 dark:text-slate-400">שיא רצף: {maxStreak} ימים</p>
                </div>
            );
        };

        const App = () => {
          const [users, setUsers] = useState([]);
          const [activeUserId, setActiveUserId] = useState(null);
          const [habitsByUser, setHabitsByUser] = useState({});
          const [rewardsByUser, setRewardsByUser] = useState({});
          
          const [activeView, setActiveView] = useState('DASHBOARD');
          const [activeHabitId, setActiveHabitId] = useState(null);
          
          const [isAddingHabit, setIsAddingHabit] = useState(false);
          const [isDarkMode, setIsDarkMode] = useState(false);
          const [showConfetti, setShowConfetti] = useState(false);
          const [isDataLoaded, setIsDataLoaded] = useState(false);
          
          const [toast, setToast] = useState(null); 
          const [floatingCoins, setFloatingCoins] = useState([]);
          const [showArchived, setShowArchived] = useState(false);
          const [editingNote, setEditingNote] = useState(null);
          
          // Cloud Auth States
          const [authUser, setAuthUser] = useState(null);
          const [isCloudSyncing, setIsCloudSyncing] = useState(false);

          const todayStr = new Date().toISOString().split('T')[0];
          const yesterdayStr = new Date(Date.now() - 86400000).toISOString().split('T')[0];
          const [newHabit, setNewHabit] = useState({ name: '', startDate: todayStr, endDate: '', goalType: 'total', targetDays: 0 });
          const [showUserModal, setShowUserModal] = useState(false);
          const [newUserName, setNewUserName] = useState('');
          const [newReward, setNewReward] = useState({ title: '', cost: 100 });

          // 1. Initialize Local Storage Data (Offline First)
          useEffect(() => {
            const savedTheme = localStorage.getItem('habitsApp_theme');
            if (savedTheme === 'dark') { setIsDarkMode(true); document.documentElement.classList.add('dark'); }

            const savedUsers = localStorage.getItem('habitsApp_users');
            const savedHabits = localStorage.getItem('habitsApp_data'); 
            const savedRewards = localStorage.getItem('habitsApp_rewards');

            if (savedUsers && savedHabits) {
                const pUsers = JSON.parse(savedUsers).map(u => ({...u, coins: u.coins || 0}));
                setUsers(pUsers);
                setHabitsByUser(JSON.parse(savedHabits)); 
                setRewardsByUser(savedRewards ? JSON.parse(savedRewards) : { [pUsers[0].id]: defaultRewards });
                setActiveUserId(localStorage.getItem('habitsApp_activeUser') || pUsers[0].id);
            } else {
                const defUsers = generateDefaultUsers();
                setUsers(defUsers);
                setHabitsByUser({ [defUsers[0].id]: generateMockData() });
                setRewardsByUser({ [defUsers[0].id]: defaultRewards });
                setActiveUserId(defUsers[0].id);
            }
            setIsDataLoaded(true);
          }, []);

          // 2. Initialize Firebase Auth
          useEffect(() => {
              if (!isCloudEnabled || !auth) return;
              const initAuth = async () => {
                  try {
                      if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                          await signInWithCustomToken(auth, __initial_auth_token);
                      } else {
                          onAuthStateChanged(auth, (user) => {
                              if(!user) signInAnonymously(auth);
                          });
                      }
                  } catch(e) { console.error("Auth error", e); }
              };
              initAuth();

              const unsubscribe = onAuthStateChanged(auth, (user) => setAuthUser(user));
              return () => unsubscribe();
          }, []);

          // 3. Cloud Sync Listeners (Firestore -> React)
          useEffect(() => {
              if (!isCloudEnabled || !authUser || !db || !isDataLoaded) return;
              setIsCloudSyncing(true);
              const docRef = doc(db, 'artifacts', currentAppId, 'users', authUser.uid, 'appData', 'main');
              
              const unsubscribe = onSnapshot(docRef, (docSnap) => {
                  setIsCloudSyncing(false);
                  if (docSnap.exists() && !docSnap.metadata.hasPendingWrites) {
                      const data = docSnap.data();
                      if(data.users) setUsers(data.users);
                      if(data.habitsByUser) setHabitsByUser(data.habitsByUser);
                      if(data.rewardsByUser) setRewardsByUser(data.rewardsByUser);
                      if(data.isDarkMode !== undefined) {
                          setIsDarkMode(data.isDarkMode);
                          if(data.isDarkMode) document.documentElement.classList.add('dark');
                          else document.documentElement.classList.remove('dark');
                      }
                  }
              }, (err) => {
                  console.error("Sync error", err);
                  setIsCloudSyncing(false);
              });
              return () => unsubscribe();
          }, [authUser, isDataLoaded]);

          // 4. Save to Local Storage & Cloud (React -> Storage/Firestore)
          useEffect(() => {
            if (!isDataLoaded) return;
            localStorage.setItem('habitsApp_users', JSON.stringify(users));
            localStorage.setItem('habitsApp_data', JSON.stringify(habitsByUser));
            localStorage.setItem('habitsApp_rewards', JSON.stringify(rewardsByUser));
            if (activeUserId) localStorage.setItem('habitsApp_activeUser', activeUserId);
            localStorage.setItem('habitsApp_theme', isDarkMode ? 'dark' : 'light');
            if (isDarkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');

            if (isCloudEnabled && authUser && db) {
                const docRef = doc(db, 'artifacts', currentAppId, 'users', authUser.uid, 'appData', 'main');
                setIsCloudSyncing(true);
                setDoc(docRef, { users, habitsByUser, rewardsByUser, isDarkMode, lastUpdated: new Date().toISOString() }, { merge: true })
                    .then(() => setIsCloudSyncing(false))
                    .catch(() => setIsCloudSyncing(false));
            }
          }, [users, habitsByUser, rewardsByUser, activeUserId, isDarkMode, isDataLoaded]);

          const showToastMsg = (message, icon = 'fa-info-circle', colorClass = 'bg-indigo-600') => {
              setToast({ message, icon, colorClass, id: Date.now() });
              setTimeout(() => setToast(null), 3000);
          };

          // --- Authentication Actions ---
          const handleGoogleLogin = async () => {
              if(!auth) return showToastMsg('הענן אינו מוגדר', 'fa-cloud-xmark', 'bg-red-500');
              const provider = new GoogleAuthProvider();
              try {
                  await signInWithPopup(auth, provider);
                  showToastMsg('התחברת בהצלחה!', 'fa-user-check', 'bg-emerald-600');
              } catch (e) {
                  showToastMsg('שגיאה בהתחברות לגוגל', 'fa-triangle-exclamation', 'bg-red-500');
              }
          };

          const handleLogout = async () => {
              if(!auth) return;
              await signOut(auth);
              showToastMsg('התנתקת מהחשבון', 'fa-right-from-bracket', 'bg-indigo-500');
          };

          // --- App Logic ---
          const activeUser = users.find(u => u.id === activeUserId) || users[0] || {};
          const activeHabits = activeUserId ? (habitsByUser[activeUserId] || []) : [];
          const activeRewards = activeUserId ? (rewardsByUser[activeUserId] || defaultRewards) : defaultRewards;

          const smartMessage = useMemo(() => {
              const visibleHabits = activeHabits.filter(h => !h.isArchived);
              if (!visibleHabits.length) return { icon: 'fa-hand-sparkles', text: "ברוך הבא! הוסף הרגל חדש כדי להתחיל לצמוח.", color: "text-indigo-600 dark:text-indigo-400" };
              let hasMissedYesterday = false; let greatStreaksCount = 0;
              visibleHabits.forEach(h => {
                  let streak = 0; const sortedDates = Object.keys(h.logs || {}).sort().reverse();
                  for (let date of sortedDates) {
                      if (date > todayStr) continue;
                      if (h.logs[date] === 1) streak++; else if (date !== todayStr) break; 
                  }
                  if (streak >= 7) greatStreaksCount++;
                  if (h.logs[yesterdayStr] === -1 || h.logs[yesterdayStr] === 0) hasMissedYesterday = true;
              });
              if (greatStreaksCount >= 2) return { icon: 'fa-fire-flame-curved', text: "וואו! אתה על גל של התמדה. המשך כך והעץ שלך רק ימשיך לפרוח!", color: "text-orange-500" };
              if (hasMissedYesterday) return { icon: 'fa-arrow-rotate-right', text: "אתמול התפספס? לא קרה כלום! היום זה יום חדש להתחלה חדשה. עלה והצלחה!", color: "text-blue-500" };
              return { icon: 'fa-sun', text: "שיהיה יום מוצלח, מלא בעשייה והתקדמות אישית!", color: "text-amber-500" };
          }, [activeHabits]);

          const getHabitStats = (habit) => {
            const logs = habit.logs || {};
            const successCount = Object.values(logs).filter(v => v === 1).length;
            const totalDays = Math.max(1, Math.ceil((new Date(habit.endDate) - new Date(habit.startDate)) / 86400000) + 1);
            let progress = 0; let isGoalMet = false; let currentWeekSuccesses = 0;
            if (habit.goalType === 'weekly' && habit.targetDays > 0) {
                const d = new Date(todayStr); d.setDate(d.getDate() - d.getDay()); 
                let currDate = new Date(d.toISOString().split('T')[0]);
                for (let i=0; i<7; i++) {
                    if (logs[currDate.toISOString().split('T')[0]] === 1) currentWeekSuccesses++;
                    currDate.setDate(currDate.getDate()+1);
                }
                progress = Math.min(100, (currentWeekSuccesses / habit.targetDays) * 100);
                isGoalMet = currentWeekSuccesses >= habit.targetDays;
            } else {
                progress = totalDays > 0 ? (successCount / totalDays) * 100 : 0;
                isGoalMet = habit.targetDays > 0 && successCount >= habit.targetDays;
            }
            let streak = 0;
            const sortedDates = Object.keys(logs).sort().reverse();
            for (let date of sortedDates) {
              if (date > todayStr) continue;
              if (logs[date] === 1) streak++; else if (date !== todayStr) break; 
            }
            return { successCount, totalDays, progress, isGoalMet, streak, currentWeekSuccesses };
          };

          const allAchievements = useMemo(() => {
            let maxStreak = 0;
            activeHabits.forEach(h => { if(!h.isArchived) { const s = getHabitStats(h); if (s.streak > maxStreak) maxStreak = s.streak; } });
            return { maxStreak };
          }, [activeHabits]);

          const updateUserCoins = (amount) => setUsers(users.map(u => u.id === activeUserId ? { ...u, coins: Math.max(0, (u.coins || 0) + amount) } : u));
          
          const triggerCelebration = () => {
            playSound('milestone');
            setShowConfetti(true);
            setTimeout(() => setShowConfetti(false), 3000);
          };

          const toggleLog = (habitId, date, status, e = null) => {
            let coinsChange = 0;
            let playedSound = false;
            const newHabits = activeHabits.map(h => {
              if (h.id === habitId) {
                const currStatus = h.logs[date]; const newStatus = currStatus === status ? 0 : status;
                if (newStatus === 1 && currStatus !== 1) {
                    coinsChange = 10;
                    if (e) {
                        const r = e.currentTarget.getBoundingClientRect(); const id = Date.now();
                        setFloatingCoins(p => [...p, { id, x: r.left + r.width/2, y: r.top }]);
                        setTimeout(() => setFloatingCoins(p => p.filter(c => c.id !== id)), 1000);
                    }
                    playSound('success'); playedSound = true;
                    const ts = getHabitStats({ ...h, logs: { ...h.logs, [date]: 1 } });
                    if (ts.streak > 0 && ts.streak % 7 === 0) triggerCelebration();
                } else if (currStatus === 1 && newStatus !== 1) coinsChange = -10;
                return { ...h, logs: { ...h.logs, [date]: newStatus } };
              }
              return h;
            });
            setHabitsByUser({ ...habitsByUser, [activeUserId]: newHabits });
            if (coinsChange !== 0) updateUserCoins(coinsChange);
          };

          const toggleArchive = (habitId) => {
              const newHabits = activeHabits.map(h => h.id === habitId ? { ...h, isArchived: !h.isArchived } : h);
              setHabitsByUser({ ...habitsByUser, [activeUserId]: newHabits });
              showToastMsg('מצב הארכיון עודכן', 'fa-box-archive');
              setActiveView('DASHBOARD');
          };

          const saveNote = () => {
              const newHabits = activeHabits.map(h => {
                  if (h.id === editingNote.habitId) return { ...h, notes: { ...(h.notes||{}), [editingNote.date]: editingNote.text } };
                  return h;
              });
              setHabitsByUser({ ...habitsByUser, [activeUserId]: newHabits });
              setEditingNote(null);
          };

          // --- Drag and Drop Logic ---
          const handleDragStart = (e, id) => {
              e.dataTransfer.setData('text/plain', id);
              e.currentTarget.style.opacity = '0.4';
          };
          const handleDragEnd = (e) => {
              e.currentTarget.style.opacity = '1';
              e.currentTarget.classList.remove('drag-over');
          };
          const handleDragOver = (e) => {
              e.preventDefault(); e.currentTarget.classList.add('drag-over');
          };
          const handleDragLeave = (e) => {
              e.currentTarget.classList.remove('drag-over');
          };
          const handleDrop = (e, targetId) => {
              e.preventDefault(); e.currentTarget.classList.remove('drag-over');
              const draggedId = e.dataTransfer.getData('text/plain');
              if (draggedId === targetId) return;

              const allUserHabits = [...activeHabits];
              const draggedIdx = allUserHabits.findIndex(h => h.id === draggedId);
              const targetIdx = allUserHabits.findIndex(h => h.id === targetId);
              if (draggedIdx === -1 || targetIdx === -1) return;

              const [draggedHabit] = allUserHabits.splice(draggedIdx, 1);
              allUserHabits.splice(targetIdx, 0, draggedHabit);
              
              setHabitsByUser({ ...habitsByUser, [activeUserId]: allUserHabits });
          };

          // --- Sub-Views ---
          if (!isDataLoaded) return <div className="min-h-screen flex items-center justify-center text-indigo-500"><i className="fa-solid fa-spinner fa-spin text-4xl"></i></div>;

          const DashboardView = () => {
              const visibleHabits = activeHabits.filter(h => !h.isArchived);
              const archivedHabits = activeHabits.filter(h => h.isArchived);

              return (
                <div className="space-y-8 animate-in fade-in duration-500">
                  <div className="bg-white dark:bg-slate-800 rounded-2xl p-4 shadow-sm border border-slate-100 dark:border-slate-700 flex items-center gap-4 transition-colors">
                      <div className={`w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center shrink-0 ${smartMessage.color}`}><i className={`fa-solid ${smartMessage.icon} text-xl`}></i></div>
                      <div>
                          <h3 className="font-bold text-slate-800 dark:text-slate-200 text-sm opacity-70 mb-1">הודעת מערכת:</h3>
                          <p className="text-slate-700 dark:text-slate-300 font-medium">{smartMessage.text}</p>
                      </div>
                  </div>

              {floatingCoins.map(coin => (<div key={coin.id} className="fixed z-50 animate-float-up text-amber-500 font-black text-xl drop-shadow-md" style={{ left: coin.x, top: coin.y }}>+10 <i className="fa-solid fa-coins text-sm"></i></div>))}
              {toast && (<div className="fixed bottom-8 left-1/2 -translate-x-1/2 animate-toast flex items-center gap-3 px-6 py-3 rounded-full shadow-lg text-white font-bold text-sm" style={{backgroundColor: toast.colorClass.includes('bg-red') ? '#ef4444' : toast.colorClass.includes('bg-emerald') ? '#10b981' : '#4f46e5'}}><i className={`fa-solid ${toast.icon} text-lg`}></i> {toast.message}</div>)}

                            )}

                    <div className="bg-white dark:bg-slate-800 w-full max-w-md rounded-3xl shadow-2xl p-8 animate-in zoom-in-95 duration-200">
                      <h2 className="text-2xl font-bold mb-6 text-slate-800 dark:text-white">יצירת הרגל חדש</h2>
                      <form onSubmit={(e) => { e.preventDefault(); const id = Date.now().toString(); setHabitsByUser({ ...habitsByUser, [activeUserId]: [...activeHabits, { ...newHabit, id, logs: {}, notes: {}, isArchived: false }] }); setNewHabit({ name: '', startDate: todayStr, endDate: '', goalType: 'total', targetDays: 0 }); setIsAddingHabit(false); showToastMsg('הרגל חדש נוצר בהצלחה!', 'fa-seedling', 'bg-emerald-600'); }} className="space-y-4">

                {/* Modal: Note Editor */}
                {editingNote && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                        <div className="bg-white dark:bg-slate-800 w-full max-w-md rounded-3xl shadow-2xl p-6 animate-in zoom-in-95 duration-200">
                            <div className="flex items-center gap-2 mb-4 text-indigo-600 dark:text-indigo-400">
                                <i className="fa-solid fa-book-open text-xl"></i>
                                <h2 className="text-xl font-bold">יומן אישי - {new Date(editingNote.date).toLocaleDateString('he-IL', {day: '2-digit', month: '2-digit'})}</h2>
                            </div>
                            <textarea 
                                autoFocus placeholder="איך הלך היום? תובנות, קשיים או הצלחות..." value={editingNote.text} onChange={e => setEditingNote({...editingNote, text: e.target.value})}
                                className="w-full h-32 p-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none resize-none text-slate-800 dark:text-white mb-4"
                            />
                            <div className="flex gap-3">
                                <button onClick={saveNote} className="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-all">שמור הערה</button>
                                <button onClick={() => setEditingNote(null)} className="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 font-bold py-3 rounded-xl transition-all">סגור</button>
                            </div>
                        </div>
                    </div>
                )}
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
