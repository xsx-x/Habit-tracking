<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מעקב הרגלים והישגים - גרסה מלאה ובענן</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Background Gradients */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #F8FAFC;
            background-image: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 60%);
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        .dark body {
            background-color: #0F172A;
            background-image: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 60%);
        }

        /* Animations */
        @keyframes confetti {
            0% { opacity: 1; transform: translate(0, 0) rotate(0deg); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(720deg); }
        }
        .animate-confetti { animation: confetti forwards ease-out; }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -60px) scale(1.5); }
        }
        .animate-float-up { animation: floatUp 1s ease-out forwards; pointer-events: none; }
        
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            10% { opacity: 1; transform: translate(-50%, 0); }
            90% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, 20px); }
        }
        .animate-toast { animation: slideUpFade 3s ease-in-out forwards; left: 50%; z-index: 1000; }

        @keyframes shimmer {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .shimmer-effect {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite linear;
        }

        /* Custom Scrollbar */
        .scrollbar-hide::-webkit-scrollbar { height: 6px; width: 6px; }
        .scrollbar-hide::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .dark .scrollbar-hide::-webkit-scrollbar-thumb { background-color: #475569; }
        
        /* Layout Grids */
        .heatmap-grid { display: grid; grid-template-rows: repeat(7, 1fr); grid-auto-flow: column; gap: 4px; overflow-x: auto; padding-bottom: 10px; }
        .drag-over { border: 2px dashed #6366f1 !important; transform: scale(1.02); }
    </style>
</head>
<body class="transition-colors duration-500 min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { initializeFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        // ------------------------------------------------------------------------
        // 🔥 הגדרות חיבור לענן (Firebase) 🔥
        // ------------------------------------------------------------------------
        const myFirebaseConfig = {
            apiKey: "AIzaSyA5lLpwsJfwy_oxtjTj9UBHPjzRicjWP-8",
            authDomain: "habit-tracking-39229.firebaseapp.com",
            projectId: "habit-tracking-39229",
            storageBucket: "habit-tracking-39229.firebasestorage.app",
            messagingSenderId: "488736239559",
            appId: "1:488736239559:web:636e68e7333aef1c7833e2",
            measurementId: "G-2DE18VWV7G"
        };

        const cleanConfig = {};
        for (const key in myFirebaseConfig) {
            cleanConfig[key] = typeof myFirebaseConfig[key] === 'string' 
                ? myFirebaseConfig[key].replace(/[\s\uFEFF\xA0]+/g, '') 
                : myFirebaseConfig[key];
        }

        let app, auth, db;
        let isCloudEnabled = false;
        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'my-habits-app';

        try {
            const configToUse = typeof __firebase_config !== 'undefined' 
                ? JSON.parse(__firebase_config) 
                : cleanConfig;
            
            if (configToUse && configToUse.apiKey) {
                app = initializeApp(configToUse);
                auth = getAuth(app);
                db = initializeFirestore(app, {
                    experimentalForceLongPolling: true
                });
                isCloudEnabled = true;
            }
        } catch (e) {
            console.error("שגיאה בהפעלת Firebase:", e);
        }

        const generateDefaultUsers = () => [{ id: 'user-default', name: 'הפרופיל שלי', avatar: 'fa-user', coins: 0 }];
        const defaultRewards = [
            { id: 'r1', title: 'קניית ספר חדש', cost: 500 },
            { id: 'r2', title: 'כוס קפה מיוחדת', cost: 100 }
        ];

        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gainNode = ctx.createGain();
                osc.connect(gainNode); gainNode.connect(ctx.destination);
                if(type === 'success') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(659.25, ctx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.1, ctx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
                } else {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(440, ctx.currentTime); osc.frequency.setValueAtTime(554.37, ctx.currentTime + 0.1); osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.15, ctx.currentTime); gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
                    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
                }
            } catch(e) {}
        };

        const OnboardingModal = ({ onComplete }) => (
            <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                <div className="bg-white dark:bg-slate-800 rounded-[2rem] shadow-2xl max-w-md w-full p-8 text-center animate-in zoom-in-95 duration-500 border border-slate-100 dark:border-slate-700 relative overflow-hidden">
                    <div className="absolute -top-20 -right-20 w-48 h-48 bg-indigo-50 dark:bg-indigo-900/20 rounded-full blur-3xl pointer-events-none"></div>
                    <div className="absolute -bottom-20 -left-20 w-48 h-48 bg-purple-50 dark:bg-purple-900/20 rounded-full blur-3xl pointer-events-none"></div>

                    <div className="relative z-10">
                        <div className="w-24 h-24 bg-gradient-to-tr from-indigo-100 to-purple-100 dark:from-indigo-900/50 dark:to-purple-900/50 text-indigo-600 dark:text-indigo-400 rounded-full flex items-center justify-center mx-auto mb-6 text-5xl shadow-inner border-4 border-white dark:border-slate-800">
                            <i className="fa-solid fa-leaf"></i>
                        </div>
                        <h2 className="text-3xl font-black text-slate-800 dark:text-white mb-2">ברוכים הבאים!</h2>
                        <p className="text-slate-500 dark:text-slate-400 mb-8 text-sm">מעקב הרגלים חכם למעקב אחר ההתקדמות שלך.</p>
                        
                        <div className="space-y-6 text-right mb-8">
                            <div className="flex items-center gap-4 bg-slate-50 dark:bg-slate-800/50 p-3 rounded-2xl">
                                <div className="w-12 h-12 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 rounded-xl flex items-center justify-center text-xl shrink-0"><i className="fa-solid fa-list-check"></i></div>
                                <div>
                                    <h4 className="font-bold text-slate-800 dark:text-slate-200 text-sm">הגדר יעדים ברורים</h4>
                                    <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">הוסף את ההרגלים שחשוב לך לטפח השנה.</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-4 bg-slate-50 dark:bg-slate-800/50 p-3 rounded-2xl">
                                <div className="w-12 h-12 bg-amber-100 dark:bg-amber-900/30 text-amber-600 rounded-xl flex items-center justify-center text-xl shrink-0"><i className="fa-solid fa-coins"></i></div>
                                <div>
                                    <h4 className="font-bold text-slate-800 dark:text-slate-200 text-sm">הרווח מטבעות הצלחה</h4>
                                    <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">על כל התמדה תקבל מטבעות זהב לחנות הפרסים.</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-4 bg-slate-50 dark:bg-slate-800/50 p-3 rounded-2xl">
                                <div className="w-12 h-12 bg-purple-100 dark:bg-purple-900/30 text-purple-600 rounded-xl flex items-center justify-center text-xl shrink-0"><i className="fa-solid fa-tree"></i></div>
                                <div>
                                    <h4 className="font-bold text-slate-800 dark:text-slate-200 text-sm">הצמח את עץ ההתמדה</h4>
                                    <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">ככל שרצף ההצלחות יעלה, כך העץ שלך יפרח!</p>
                                </div>
                            </div>
                        </div>
                        
                        <button onClick={onComplete} className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-xl shadow-indigo-200 dark:shadow-none text-lg flex justify-center items-center gap-2">
                            בואו נתחיל <i className="fa-solid fa-arrow-left"></i>
                        </button>
                    </div>
                </div>
            </div>
        );

        const VisualGrowthTree = ({ maxStreak }) => {
            let icon = 'fa-seedling'; let color = 'text-slate-400'; let bg = 'bg-slate-100 dark:bg-slate-800';
            let title = 'זרע התחלה'; let size = 'text-3xl'; let glow = '';
            if (maxStreak >= 30) { icon = 'fa-tree'; color = 'text-amber-400'; bg = 'bg-amber-100 dark:bg-amber-900/40'; title = 'עץ זהב מואר!'; size = 'text-6xl'; glow = 'drop-shadow-[0_0_15px_rgba(251,191,36,0.8)]'; }
            else if (maxStreak >= 15) { icon = 'fa-tree'; color = 'text-emerald-600'; bg = 'bg-emerald-100 dark:bg-emerald-900/40'; title = 'עץ חזק ויציב'; size = 'text-5xl'; }
            else if (maxStreak >= 7) { icon = 'fa-tree'; color = 'text-emerald-500'; bg = 'bg-emerald-50 dark:bg-emerald-900/20'; title = 'עץ צומח'; size = 'text-4xl'; }
            else if (maxStreak >= 3) { icon = 'fa-leaf'; color = 'text-green-500'; bg = 'bg-green-50 dark:bg-green-900/20'; title = 'שתיל צעיר'; size = 'text-3xl'; }
            else if (maxStreak >= 1) { icon = 'fa-seedling'; color = 'text-green-400'; bg = 'bg-green-50 dark:bg-green-900/10'; title = 'נבט ראשון'; size = 'text-3xl'; }

            return (
                <div className="flex flex-col items-center justify-center p-4">
                    <div className={`w-24 h-24 rounded-full flex items-center justify-center transition-all duration-1000 ${bg}`}>
                        <i className={`fa-solid ${icon} ${color} ${size} ${glow} transition-all duration-1000 transform hover:scale-110`}></i>
                    </div>
                    <h3 className="mt-3 font-bold text-slate-700 dark:text-slate-200">{title}</h3>
                    <p className="text-sm text-slate-500 dark:text-slate-400">שיא רצף: {maxStreak} ימים</p>
                </div>
            );
        };

        const App = () => {
          const [users, setUsers] = useState([]);
          const [activeUserId, setActiveUserId] = useState(null);
          const [habitsByUser, setHabitsByUser] = useState({});
          const [rewardsByUser, setRewardsByUser] = useState({});
          
          const [activeView, setActiveView] = useState('DASHBOARD');
          const [activeHabitId, setActiveHabitId] = useState(null);
          
          const [isAddingHabit, setIsAddingHabit] = useState(false);
          const [isDarkMode, setIsDarkMode] = useState(false);
          const [showConfetti, setShowConfetti] = useState(false);
          const [isDataLoaded, setIsDataLoaded] = useState(false);
          
          const [isCloudDataLoaded, setIsCloudDataLoaded] = useState(false);
          
          const [showOnboarding, setShowOnboarding] = useState(false);
          const [toast, setToast] = useState(null); 
          const [floatingCoins, setFloatingCoins] = useState([]);
          const [showArchived, setShowArchived] = useState(false);
          const [editingNote, setEditingNote] = useState(null);
          
          const [authUser, setAuthUser] = useState(null);
          const [isCloudSyncing, setIsCloudSyncing] = useState(false);
          const [showAuthModal, setShowAuthModal] = useState(false);
          const [authEmail, setAuthEmail] = useState('');
          const [authPassword, setAuthPassword] = useState('');
          const [isSignUp, setIsSignUp] = useState(false);

          const todayStr = new Date().toISOString().split('T')[0];
          const yesterdayStr = new Date(Date.now() - 86400000).toISOString().split('T')[0];
          const [newHabit, setNewHabit] = useState({ name: '', startDate: todayStr, endDate: '', frequencyType: 'daily', specificDays: [], weeklyTarget: 1, rewardAmount: 10 });
          const [showUserModal, setShowUserModal] = useState(false);
          const [newUserName, setNewUserName] = useState('');
          const [newReward, setNewReward] = useState({ title: '', cost: 100 });

          // 1. חילוץ מהזיכרון המקומי
          useEffect(() => {
            const hasSeenOnboarding = localStorage.getItem('habitsApp_onboarding');
            if (!hasSeenOnboarding) setShowOnboarding(true);

            const savedTheme = localStorage.getItem('habitsApp_theme');
            if (savedTheme === 'dark') { setIsDarkMode(true); document.documentElement.classList.add('dark'); }

            const savedUsers = localStorage.getItem('habitsApp_users');
            const savedHabits = localStorage.getItem('habitsApp_data'); 
            const savedRewards = localStorage.getItem('habitsApp_rewards');

            if (savedUsers && savedHabits) {
                const pUsers = JSON.parse(savedUsers).map(u => ({...u, coins: u.coins || 0}));
                setUsers(pUsers);
                setHabitsByUser(JSON.parse(savedHabits)); 
                setRewardsByUser(savedRewards ? JSON.parse(savedRewards) : { [pUsers[0].id]: defaultRewards });
                setActiveUserId(localStorage.getItem('habitsApp_activeUser') || pUsers[0].id);
            } else {
                const defUsers = generateDefaultUsers();
                setUsers(defUsers);
                setHabitsByUser({ [defUsers[0].id]: [] }); 
                setRewardsByUser({ [defUsers[0].id]: defaultRewards });
                setActiveUserId(defUsers[0].id);
            }
            setIsDataLoaded(true);
          }, []);

          // 2. האזנה לחיבור הענן
          useEffect(() => {
              if (!isCloudEnabled || !auth) return;
              const unsubscribe = onAuthStateChanged(auth, (user) => {
                  setAuthUser(user);
                  if (!user) setIsCloudDataLoaded(false);
              });
              return () => unsubscribe();
          }, []);

          // 3. משיכת נתונים מהענן
          useEffect(() => {
              if (!isCloudEnabled || !authUser || !db || !isDataLoaded) return;
              setIsCloudSyncing(true);
              const docRef = doc(db, 'artifacts', currentAppId, 'users', authUser.uid, 'appData', 'main');
              
              const unsubscribe = onSnapshot(docRef, (docSnap) => {
                  setIsCloudSyncing(false);
                  if (docSnap.exists() && !docSnap.metadata.hasPendingWrites) {
                      const data = docSnap.data();
                      if(data.users) setUsers(data.users);
                      if(data.habitsByUser) setHabitsByUser(data.habitsByUser);
                      if(data.rewardsByUser) setRewardsByUser(data.rewardsByUser);
                      if(data.isDarkMode !== undefined) {
                          setIsDarkMode(data.isDarkMode);
                          if(data.isDarkMode) document.documentElement.classList.add('dark');
                          else document.documentElement.classList.remove('dark');
                      }
                  }
                  setIsCloudDataLoaded(true);
              }, (err) => {
                  console.error("Sync error", err);
                  setIsCloudSyncing(false);
                  setIsCloudDataLoaded(true);
              });
              return () => unsubscribe();
          }, [authUser, isDataLoaded]);

          const showToastMsg = (message, icon = 'fa-info-circle', colorClass = 'bg-indigo-600') => {
              setToast({ message, icon, colorClass, id: Date.now() });
              setTimeout(() => setToast(null), 3000);
          };

          // 4. שמירה מקומית ולענן
          useEffect(() => {
            if (!isDataLoaded) return;
            localStorage.setItem('habitsApp_users', JSON.stringify(users));
            localStorage.setItem('habitsApp_data', JSON.stringify(habitsByUser));
            localStorage.setItem('habitsApp_rewards', JSON.stringify(rewardsByUser));
            if (activeUserId) localStorage.setItem('habitsApp_activeUser', activeUserId);
            localStorage.setItem('habitsApp_theme', isDarkMode ? 'dark' : 'light');
            if (isDarkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');

            if (isCloudEnabled && authUser && db && isCloudDataLoaded) {
                const docRef = doc(db, 'artifacts', currentAppId, 'users', authUser.uid, 'appData', 'main');
                setIsCloudSyncing(true);
                setDoc(docRef, { users, habitsByUser, rewardsByUser, isDarkMode, lastUpdated: new Date().toISOString() }, { merge: true })
                    .then(() => setIsCloudSyncing(false))
                    .catch((err) => {
                        console.error("Firestore Save Error:", err);
                        setIsCloudSyncing(false);
                    });
            }
          }, [users, habitsByUser, rewardsByUser, activeUserId, isDarkMode, isDataLoaded, authUser, db, isCloudDataLoaded]);


          const handleEmailAuth = async (e) => {
              e.preventDefault();
              if(!auth) return showToastMsg('הענן אינו מוגדר', 'fa-cloud-xmark', 'bg-red-500');
              const cleanEmail = authEmail.trim();
              const cleanPassword = authPassword.trim();
              try {
                  if (isSignUp) {
                      await createUserWithEmailAndPassword(auth, cleanEmail, cleanPassword);
                      showToastMsg('חשבון נוצר והתחברת בהצלחה!', 'fa-user-check', 'bg-emerald-600');
                  } else {
                      await signInWithEmailAndPassword(auth, cleanEmail, cleanPassword);
                      showToastMsg('התחברת בהצלחה!', 'fa-user-check', 'bg-emerald-600');
                  }
                  setShowAuthModal(false);
                  setAuthEmail('');
                  setAuthPassword('');
              } catch (error) {
                  let msg = 'שגיאה בהתחברות';
                  if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found' || error.code === 'auth/invalid-email') msg = 'אימייל או סיסמה שגויים';
                  if (error.code === 'auth/email-already-in-use') msg = 'האימייל כבר קיים במערכת';
                  if (error.code === 'auth/weak-password') msg = 'הסיסמה חלשה מדי (לפחות 6 תווים)';
                  showToastMsg(msg, 'fa-triangle-exclamation', 'bg-red-500');
              }
          };

          const handleLogout = async () => {
              if(!auth) return;
              await signOut(auth);
              showToastMsg('התנתקת מהחשבון', 'fa-right-from-bracket', 'bg-indigo-500');
          };

          const activeUser = users.find(u => u.id === activeUserId) || users[0] || {};
          const activeHabits = activeUserId ? (habitsByUser[activeUserId] || []) : [];
          const activeRewards = activeUserId ? (rewardsByUser[activeUserId] || defaultRewards) : defaultRewards;

          const getHabitStats = (habit) => {
            const logs = habit.logs || {};
            const frequencyType = habit.frequencyType || 'daily';
            const successCount = Object.values(logs).filter(v => v === 1).length;
            
            let totalDays = 0;
            const start = new Date(habit.startDate);
            const end = new Date(habit.endDate);
            const today = new Date(todayStr);
            
            let curr = new Date(start);
            while (curr <= end) {
                if (frequencyType === 'specific_days') {
                    if (habit.specificDays && habit.specificDays.includes(curr.getDay())) totalDays++;
                } else {
                    totalDays++;
                }
                curr.setDate(curr.getDate() + 1);
            }
            if (frequencyType === 'weekly_target') {
                const totalWeeks = Math.ceil(((end - start) / 86400000 + 1) / 7);
                totalDays = totalWeeks * (habit.weeklyTarget || 1);
            }
            if (totalDays === 0) totalDays = 1; 

            let progress = (successCount / totalDays) * 100;
            let streak = 0;
            
            if (frequencyType === 'weekly_target') {
                let currentStreak = 0;
                const weeks = {};
                for (const [dateStr, status] of Object.entries(logs)) {
                    if (status === 1) {
                        const logDate = new Date(dateStr);
                        if (logDate >= start && logDate <= today) {
                            const diffDays = Math.floor((logDate - start) / 86400000);
                            const weekIdx = Math.floor(diffDays / 7);
                            weeks[weekIdx] = (weeks[weekIdx] || 0) + 1;
                        }
                    }
                }
                const currentWeekIdx = Math.floor((today - start) / 86400000 / 7);
                for (let i = currentWeekIdx; i >= 0; i--) {
                    if ((weeks[i] || 0) >= (habit.weeklyTarget || 1)) {
                        currentStreak++;
                    } else if (i !== currentWeekIdx) {
                        break;
                    }
                }
                streak = currentStreak;
            } else {
                const requiredDates = [];
                let d = new Date(today);
                if (d > end) d = new Date(end);
                
                let daysLooked = 0;
                while (d >= start && daysLooked < 365) {
                    if (frequencyType === 'specific_days') {
                        if (habit.specificDays && habit.specificDays.includes(d.getDay())) {
                            requiredDates.push(d.toISOString().split('T')[0]);
                        }
                    } else {
                        requiredDates.push(d.toISOString().split('T')[0]);
                    }
                    d.setDate(d.getDate() - 1);
                    daysLooked++;
                }
                
                for (let date of requiredDates) {
                    if (logs[date] === 1) {
                        streak++;
                    } else if (date !== todayStr) {
                        break;
                    }
                }
            }
            
            return { successCount, totalDays, progress, streak };
          };

          const allAchievements = useMemo(() => {
            let maxStreak = 0;
            activeHabits.forEach(h => { if(!h.isArchived) { const s = getHabitStats(h); if (s.streak > maxStreak) maxStreak = s.streak; } });
            return { maxStreak };
          }, [activeHabits]);

          const smartMessage = useMemo(() => {
              const visibleHabits = activeHabits.filter(h => !h.isArchived);

                          </div>
                      </div>
                  </div>
              );

                        {activeUser.coins || 0} <i className="fa-solid fa-store"></i>

                      <button onClick={() => setActiveView('DASHBOARD')} className={`w-10 h-10 rounded-xl shadow-sm border flex items-center justify-center active:scale-90 transition-all ${activeView === 'DASHBOARD' ? 'bg-indigo-50 border-indigo-200 dark:border-indigo-800 dark:bg-indigo-900/30 text-indigo-600' : 'bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-400 hover:shadow-md hover:text-indigo-500'}`}><i className="fa-solid fa-table-cells-large text-xl"></i></button>

                                    {['א׳', 'ב׳', 'ג׳', 'ד׳', 'ה׳', 'ו׳', 'ש׳'].map((day, idx) => {

                                                const newDays = isSelected ? currentDays.filter(d => d !== idx) : [...currentDays, idx];
                                                setNewHabit({...newHabit, specificDays: newDays});
                                            }} className={`w-10 h-10 rounded-full font-bold transition-all shadow-sm ${isSelected ? 'bg-indigo-500 text-white shadow-indigo-200 dark:shadow-none transform scale-110' : 'bg-white dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600'}`}>
                                                {day}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                        
                        {newHabit.frequencyType === 'weekly_target' && (
                            <div className="bg-indigo-50 dark:bg-indigo-900/20 p-4 rounded-xl">
                                <label className="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-1">כמה פעמים בשבוע (גמיש)?</label>
                                <input type="number" min="1" max="7" value={newHabit.weeklyTarget} onChange={e => setNewHabit({...newHabit, weeklyTarget: parseInt(e.target.value) || 1})} className="w-full p-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl outline-none text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500"/>
                            </div>
                        )}

                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-1">מתאריך</label>
                                <input type="date" required value={newHabit.startDate} onChange={e => setNewHabit({...newHabit, startDate: e.target.value})} className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500"/>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-1">עד תאריך</label>
                                <input type="date" required value={newHabit.endDate} onChange={e => setNewHabit({...newHabit, endDate: e.target.value})} className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500"/>
                            </div>
                        </div>

                        <div>
                            <label className="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-1">מטבעות לכל ביצוע בהצלחה</label>
                            <input type="number" required min="1" value={newHabit.rewardAmount} onChange={e => setNewHabit({...newHabit, rewardAmount: parseInt(e.target.value) || 0})} className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500"/>
                        </div>
                        
                        <div className="flex gap-3 pt-6">
                          <button type="submit" className="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 rounded-2xl hover:from-indigo-700 hover:to-purple-700 shadow-md active:scale-95 transition-all text-lg">שמור הרגל</button>
                          <button type="button" onClick={() => setIsAddingHabit(false)} className="bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 px-6 font-bold py-4 rounded-2xl hover:bg-slate-200 active:scale-95 transition-all">ביטול</button>
                        </div>
                      </form>
                    </div>
                  </div>
                )}

                {editingNote && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                        <div className="bg-white dark:bg-slate-800 w-full max-w-md rounded-3xl shadow-2xl p-8 animate-in zoom-in-95 duration-200">
                            <div className="flex items-center gap-3 mb-6 text-indigo-600 dark:text-indigo-400">
                                <div className="w-12 h-12 bg-indigo-100 dark:bg-indigo-900/50 rounded-xl flex items-center justify-center"><i className="fa-solid fa-book-open text-xl"></i></div>
                                <div>
                                    <h2 className="text-xl font-bold text-slate-800 dark:text-white">יומן אישי</h2>
                                    <p className="text-sm font-medium">{new Date(editingNote.date).toLocaleDateString('he-IL', {day: '2-digit', month: '2-digit', year: 'numeric'})}</p>
                                </div>
                            </div>
                            <textarea 
                                autoFocus placeholder="איך הלך היום? תובנות, הצלחות או קשיים בדרך..." value={editingNote.text} onChange={e => setEditingNote({...editingNote, text: e.target.value})}
                                className="w-full h-40 p-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none resize-none text-slate-800 dark:text-white mb-6 text-lg leading-relaxed"
                            />
                            <div className="flex gap-3">
                                <button onClick={saveNote} className="flex-1 bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 shadow-md active:scale-95 transition-all">שמור הערה</button>
                                <button onClick={() => setEditingNote(null)} className="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 font-bold py-4 rounded-xl hover:bg-slate-200 active:scale-95 transition-all">סגור</button>
                            </div>
                        </div>
                    </div>
                )}

                {showAuthModal && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                        <div className="bg-white dark:bg-slate-800 w-full max-w-md rounded-3xl shadow-2xl p-8 animate-in zoom-in-95 duration-200 border border-slate-100 dark:border-slate-700">
                            <div className="flex items-center gap-3 mb-6">
                                <div className="w-10 h-10 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 rounded-xl flex items-center justify-center"><i className="fa-solid fa-cloud text-xl"></i></div>
                                <h2 className="text-2xl font-bold text-slate-800 dark:text-white">{isSignUp ? 'הרשמה לענן' : 'התחברות לענן'}</h2>
                            </div>
                            <form onSubmit={handleEmailAuth} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-1">אימייל</label>
                                    <input type="email" required placeholder="כתובת אימייל" value={authEmail} onChange={e => setAuthEmail(e.target.value)} className="w-full p-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all text-left" dir="ltr" />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-1">סיסמה {isSignUp && '(מינימום 6 תווים)'}</label>
                                    <input type="password" required placeholder="סיסמה" value={authPassword} onChange={e => setAuthPassword(e.target.value)} className="w-full p-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all text-left" dir="ltr" />
                                </div>
                                <div className="flex gap-3 pt-4">
                                    <button type="submit" className="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 rounded-2xl hover:from-indigo-700 hover:to-purple-700 shadow-md active:scale-95 transition-all text-lg">
                                        {isSignUp ? 'הירשם ושמור' : 'התחבר למערכת'}
                                    </button>
                                    <button type="button" onClick={() => setShowAuthModal(false)} className="bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 px-6 font-bold py-4 rounded-2xl hover:bg-slate-200 active:scale-95 transition-all">ביטול</button>
                                </div>
                            </form>
                            <div className="mt-6 text-center border-t border-slate-100 dark:border-slate-700 pt-6">
                                <p className="text-sm text-slate-500 dark:text-slate-400 mb-2">{isSignUp ? 'כבר יש לך חשבון?' : 'עדיין אין לך חשבון גיבוי?'}</p>
                                <button onClick={() => setIsSignUp(!isSignUp)} className="text-indigo-600 dark:text-indigo-400 font-bold hover:underline">
                                    {isSignUp ? 'לחץ כאן כדי להתחבר' : 'לחץ כאן להרשמה מהירה'}
                                </button>
                            </div>
                        </div>
                    </div>
                )}
                
                {showUserModal && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                        <div className="bg-white dark:bg-slate-800 w-full max-w-sm rounded-3xl shadow-2xl p-8 animate-in zoom-in-95 duration-200">
                            <h2 className="text-xl font-bold mb-4 text-slate-800 dark:text-white">פרופיל מקומי חדש</h2>
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const newId = 'user-' + Date.now();
                                setUsers([...users, { id: newId, name: newUserName, avatar: 'fa-user', coins: 0 }]);
                                setHabitsByUser({ ...habitsByUser, [newId]: [] });
                                setRewardsByUser({ ...rewardsByUser, [newId]: defaultRewards });
                                setActiveUserId(newId);
                                setNewUserName('');
                                setShowUserModal(false);
                                showToastMsg(`פרופיל מקומי נוצר: ${newUserName}`, 'fa-user-check', 'bg-indigo-600');
                            }}>
                                <input type="text" required placeholder="שם הפרופיל החדש..." value={newUserName} onChange={e => setNewUserName(e.target.value)} className="w-full p-4 mb-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none text-slate-800 dark:text-white" />
                                <div className="flex gap-3">
                                    <button type="submit" className="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl active:scale-95 transition-transform">שמור</button>
                                    <button type="button" onClick={() => {setShowUserModal(false); setActiveUserId(users[0].id);}} className="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-500 font-bold py-3 rounded-xl active:scale-95 transition-transform">ביטול</button>
                                </div>
                            </form>
                        </div>
                    </div>
                )}
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
