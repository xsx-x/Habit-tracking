<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מעקב הרגלים והישגים</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @keyframes confetti {
            0% { opacity: 1; transform: translate(0, 0) rotate(0deg); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(720deg); }
        }
        .animate-confetti { animation: confetti forwards ease-out; }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -60px) scale(1.5); }
        }
        .animate-float-up { animation: floatUp 1s ease-out forwards; pointer-events: none; }
        
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            10% { opacity: 1; transform: translate(-50%, 0); }
            90% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, 20px); }
        }
        .animate-toast { animation: slideUpFade 3s ease-in-out forwards; left: 50%; z-index: 1000; }

        .scrollbar-hide::-webkit-scrollbar { height: 6px; width: 6px; }
        .scrollbar-hide::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .dark .scrollbar-hide::-webkit-scrollbar-thumb { background-color: #475569; }
        
        .heatmap-grid {
            display: grid;
            grid-template-rows: repeat(7, 1fr);
            grid-auto-flow: column;
            gap: 4px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        
        .drag-over { border: 2px dashed #6366f1 !important; transform: scale(1.02); }
        
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC] dark:bg-slate-900 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Helper Functions & Mock Data ---
        const generateMockData = () => {
          const today = new Date();
          const getDateStr = (daysAgo) => {
            const d = new Date(today);
            d.setDate(d.getDate() - daysAgo);
            return d.toISOString().split('T')[0];
          };

          const dafYomiLogs = {};
          const dafYomiNotes = {};
          for(let i=0; i<45; i++) {
            if (i !== 5 && i !== 12) dafYomiLogs[getDateStr(i)] = 1;
            else dafYomiLogs[getDateStr(i)] = -1;
          }
          dafYomiNotes[getDateStr(1)] = "היה שיעור מרתק בבבא קמא!";
          
          const walkLogs = {};
          for(let i=0; i<10; i++) {
            if (i < 7) walkLogs[getDateStr(i)] = 1;
            else walkLogs[getDateStr(i)] = -1;
          }

          const fitnessLogs = {};
          for(let i=0; i<14; i++) {
            if (i%3 === 0) fitnessLogs[getDateStr(i)] = 1;
            else fitnessLogs[getDateStr(i)] = 0;
          }

          return [
            { id: 'mock-1', name: 'לימוד דף היומי', startDate: getDateStr(45), endDate: getDateStr(-300), goalType: 'total', targetDays: 300, logs: dafYomiLogs, notes: dafYomiNotes, isArchived: false },
            { id: 'mock-2', name: 'הליכה יומית', startDate: getDateStr(10), endDate: getDateStr(-20), goalType: 'total', targetDays: 25, logs: walkLogs, notes: {}, isArchived: false },
            { id: 'mock-3', name: 'אימון כושר', startDate: getDateStr(14), endDate: getDateStr(-30), goalType: 'weekly', targetDays: 3, logs: fitnessLogs, notes: {}, isArchived: false } 
          ];
        };

        const generateDefaultUsers = () => [{ id: 'user-default', name: 'משתמש ראשי', avatar: 'fa-user', coins: 450 }];
        const defaultRewards = [
            { id: 'r1', title: 'קניית ספר חדש', cost: 500 },
            { id: 'r2', title: 'כוס קפה שווה', cost: 50 },
            { id: 'r3', title: 'שעת מנוחה (בלי מסכים)', cost: 100 }
        ];

        // --- Sound Effects ---
        const playSuccessSound = () => {
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            osc.connect(gainNode); gainNode.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(659.25, ctx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
          } catch (e) {}
        };

        const playMilestoneSound = () => {
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            osc.connect(gainNode); gainNode.connect(ctx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, ctx.currentTime);
            osc.frequency.setValueAtTime(554.37, ctx.currentTime + 0.1);
            osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
          } catch (e) {}
        };

        // --- Components ---
        const VisualGrowthTree = ({ maxStreak }) => {
            let icon = 'fa-seedling'; let color = 'text-slate-400'; let bg = 'bg-slate-100 dark:bg-slate-800';
            let title = 'זרע התחלה'; let size = 'text-3xl'; let glow = '';

            if (maxStreak >= 30) { icon = 'fa-tree'; color = 'text-amber-400'; bg = 'bg-amber-100 dark:bg-amber-900/40'; title = 'עץ זהב מואר!'; size = 'text-6xl'; glow = 'drop-shadow-[0_0_15px_rgba(251,191,36,0.8)]'; }
            else if (maxStreak >= 15) { icon = 'fa-tree'; color = 'text-emerald-600'; bg = 'bg-emerald-100 dark:bg-emerald-900/40'; title = 'עץ חזק ויציב'; size = 'text-5xl'; }
            else if (maxStreak >= 7) { icon = 'fa-tree'; color = 'text-emerald-500'; bg = 'bg-emerald-50 dark:bg-emerald-900/20'; title = 'עץ צומח'; size = 'text-4xl'; }
            else if (maxStreak >= 3) { icon = 'fa-leaf'; color = 'text-green-500'; bg = 'bg-green-50 dark:bg-green-900/20'; title = 'שתיל צעיר'; size = 'text-3xl'; }
            else if (maxStreak >= 1) { icon = 'fa-seedling'; color = 'text-green-400'; bg = 'bg-green-50 dark:bg-green-900/10'; title = 'נבט ראשון'; size = 'text-3xl'; }

            return (
                <div className="flex flex-col items-center justify-center p-4">
                    <div className={`w-24 h-24 rounded-full flex items-center justify-center transition-all duration-1000 ${bg}`}>
                        <i className={`fa-solid ${icon} ${color} ${size} ${glow} transition-all duration-1000 transform hover:scale-110`}></i>
                    </div>
                    <h3 className="mt-3 font-bold text-slate-700 dark:text-slate-200">{title}</h3>
                    <p className="text-sm text-slate-500 dark:text-slate-400">שיא רצף: {maxStreak} ימים</p>
                </div>
            );
        };

        const App = () => {
          const [users, setUsers] = useState([]);
          const [activeUserId, setActiveUserId] = useState(null);
          const [habitsByUser, setHabitsByUser] = useState({});
          const [rewardsByUser, setRewardsByUser] = useState({});
          
          const [activeView, setActiveView] = useState('DASHBOARD');
          const [activeHabitId, setActiveHabitId] = useState(null);
          
          const [isAddingHabit, setIsAddingHabit] = useState(false);
          const [isDarkMode, setIsDarkMode] = useState(false);
          const [showConfetti, setShowConfetti] = useState(false);
          const [isLoaded, setIsLoaded] = useState(false);
          
          // UI States
          const [editingNote, setEditingNote] = useState(null); 
          const [showUserModal, setShowUserModal] = useState(false);
          const [newUserName, setNewUserName] = useState('');
          const [newReward, setNewReward] = useState({ title: '', cost: 100 });
          const [showArchived, setShowArchived] = useState(false);
          const [toast, setToast] = useState(null); // { message, icon, colorClass }
          const [floatingCoins, setFloatingCoins] = useState([]);

          const fileInputRef = useRef(null);
          const todayStr = new Date().toISOString().split('T')[0];
          const yesterdayStr = new Date(Date.now() - 86400000).toISOString().split('T')[0];

          const [newHabit, setNewHabit] = useState({
            name: '', startDate: todayStr, endDate: '', goalType: 'total', targetDays: 0
          });

          useEffect(() => {
            const savedTheme = localStorage.getItem('habitsApp_theme');
            if (savedTheme === 'dark') {
                setIsDarkMode(true);
                document.documentElement.classList.add('dark');
            }

            const savedUsers = localStorage.getItem('habitsApp_users');
            const savedHabits = localStorage.getItem('habitsApp_data'); 
            const savedRewards = localStorage.getItem('habitsApp_rewards');

            let parsedUsers = savedUsers ? JSON.parse(savedUsers) : null;
            let parsedHabits = savedHabits ? JSON.parse(savedHabits) : null;
            let parsedRewards = savedRewards ? JSON.parse(savedRewards) : {};

            if (!parsedUsers || !parsedHabits) {
                parsedUsers = generateDefaultUsers();
                setUsers(parsedUsers);
                setHabitsByUser({ 'user-default': generateMockData() });
                setRewardsByUser({ 'user-default': defaultRewards });
                setActiveUserId('user-default');
            } else {
                parsedUsers = parsedUsers.map(u => ({...u, coins: u.coins || 0}));
                setUsers(parsedUsers);
                setHabitsByUser(parsedHabits); 
                setRewardsByUser(parsedRewards);
                
                const lastUser = localStorage.getItem('habitsApp_activeUser') || parsedUsers[0].id;
                setActiveUserId(lastUser);
                
                if (!parsedRewards[lastUser]) setRewardsByUser(prev => ({...prev, [lastUser]: defaultRewards}));
            }
            setIsLoaded(true);
          }, []);

          useEffect(() => {
            if (isLoaded) {
              localStorage.setItem('habitsApp_users', JSON.stringify(users));
              localStorage.setItem('habitsApp_data', JSON.stringify(habitsByUser));
              localStorage.setItem('habitsApp_rewards', JSON.stringify(rewardsByUser));
              if (activeUserId) localStorage.setItem('habitsApp_activeUser', activeUserId);
              
              localStorage.setItem('habitsApp_theme', isDarkMode ? 'dark' : 'light');
              if (isDarkMode) document.documentElement.classList.add('dark');
              else document.documentElement.classList.remove('dark');
            }
          }, [users, habitsByUser, rewardsByUser, activeUserId, isDarkMode, isLoaded]);

          const showToastMsg = (message, icon = 'fa-info-circle', colorClass = 'bg-indigo-600') => {
              setToast({ message, icon, colorClass, id: Date.now() });
              setTimeout(() => setToast(null), 3000);
          };

          const activeUser = users.find(u => u.id === activeUserId) || {};
          const activeHabits = activeUserId ? (habitsByUser[activeUserId] || []) : [];
          const activeRewards = activeUserId ? (rewardsByUser[activeUserId] || defaultRewards) : defaultRewards;

          const smartMessage = useMemo(() => {
              const visibleHabits = activeHabits.filter(h => !h.isArchived);
              if (!visibleHabits.length) return { icon: 'fa-hand-sparkles', text: "ברוך הבא! הוסף הרגל חדש כדי להתחיל לצמוח.", color: "text-indigo-600 dark:text-indigo-400" };
              
              let hasMissedYesterday = false;
              let greatStreaksCount = 0;
              
              visibleHabits.forEach(h => {
                  let streak = 0;
                  const sortedDates = Object.keys(h.logs || {}).sort().reverse();
                  for (let date of sortedDates) {
                      if (date > todayStr) continue;
                      if (h.logs[date] === 1) streak++;
                      else if (date !== todayStr) break; 
                  }
                  if (streak >= 7) greatStreaksCount++;
                  if (h.logs[yesterdayStr] === -1 || h.logs[yesterdayStr] === 0) hasMissedYesterday = true;
              });

              if (greatStreaksCount >= 2) return { icon: 'fa-fire-flame-curved', text: "וואו! אתה על גל של התמדה. המשך כך והעץ שלך רק ימשיך לפרוח!", color: "text-orange-500" };
              if (hasMissedYesterday) return { icon: 'fa-arrow-rotate-right', text: "אתמול התפספס? לא קרה כלום! היום זה יום חדש להתחלה חדשה. עלה והצלחה!", color: "text-blue-500" };
              return { icon: 'fa-sun', text: "שיהיה יום מוצלח, מלא בעשייה והתקדמות אישית!", color: "text-amber-500" };
          }, [activeHabits, todayStr, yesterdayStr]);

          const getHeatmapDays = useMemo(() => {
              const days = [];
              for(let i=364; i>=0; i--) {
                  const d = new Date(); d.setDate(d.getDate() - i); days.push(d.toISOString().split('T')[0]);
              }
              return days;
          }, []);

          const getHabitStats = (habit) => {
            const logs = habit.logs || {};
            const successCount = Object.values(logs).filter(v => v === 1).length;
            const start = new Date(habit.startDate);
            const end = new Date(habit.endDate);
            const totalDays = Math.max(1, Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1);
            
            let progress = 0; let isGoalMet = false; let currentWeekSuccesses = 0;

            if (habit.goalType === 'weekly' && habit.targetDays > 0) {
                const d = new Date(todayStr); d.setDate(d.getDate() - d.getDay()); 
                const weekStart = d.toISOString().split('T')[0];
                
                let currDate = new Date(weekStart);
                for (let i=0; i<7; i++) {
                    const str = currDate.toISOString().split('T')[0];
                    if (logs[str] === 1) currentWeekSuccesses++;
                    currDate.setDate(currDate.getDate()+1);
                }
                progress = Math.min(100, (currentWeekSuccesses / habit.targetDays) * 100);
                isGoalMet = currentWeekSuccesses >= habit.targetDays;
            } else {
                progress = totalDays > 0 ? (successCount / totalDays) * 100 : 0;
                isGoalMet = habit.targetDays > 0 && successCount >= habit.targetDays;
            }

            let streak = 0;
            const sortedDates = Object.keys(logs).sort().reverse();
            for (let date of sortedDates) {
              if (date > todayStr) continue;
              if (logs[date] === 1) streak++;
              else if (date !== todayStr) break; 
            }

            return { successCount, totalDays, progress, isGoalMet, streak, currentWeekSuccesses };
          };

          const allAchievements = useMemo(() => {
            const badges = [];
            let maxStreak = 0;

            activeHabits.forEach(h => {
              if(h.isArchived) return; // Only count active for overall badges
              const s = getHabitStats(h);
              if (s.streak > maxStreak) maxStreak = s.streak;
              
              if (s.successCount >= 1) badges.push({ id: `first-${h.id}`, title: `צעד ראשון: ${h.name}`, icon: <i className="fa-solid fa-star text-yellow-500"></i> });
              if (s.streak >= 7) badges.push({ id: `streak7-${h.id}`, title: `התמדה (7): ${h.name}`, icon: <i className="fa-solid fa-fire text-orange-500"></i> });
              if (s.streak >= 30) badges.push({ id: `streak30-${h.id}`, title: `אלוף (30): ${h.name}`, icon: <i className="fa-solid fa-bolt text-indigo-400"></i> });
              if (s.isGoalMet && h.targetDays > 0 && h.goalType !== 'weekly') badges.push({ id: `goal-${h.id}`, title: `היעד הושג: ${h.name}`, icon: <i className="fa-solid fa-trophy text-amber-500"></i> });
            });

            if (activeHabits.filter(h=>!h.isArchived).length >= 3) badges.push({ id: 'multitask', title: 'רב-אמן: 3 הרגלים', icon: <i className="fa-solid fa-table-cells-large text-purple-500"></i> });

            return { badges, maxStreak };
          }, [activeHabits]);

          // --- Actions ---
          const updateUserCoins = (amount) => {
              setUsers(users.map(u => u.id === activeUserId ? { ...u, coins: Math.max(0, (u.coins || 0) + amount) } : u));
          };

          const triggerCelebration = () => {
            playMilestoneSound();
            setShowConfetti(true);
            setTimeout(() => setShowConfetti(false), 3000);
          };

          const toggleLog = (habitId, date, status, e = null) => {
            let playedSound = false;
            let coinsChange = 0;

            const newHabits = activeHabits.map(h => {
              if (h.id === habitId) {
                const currentStatus = h.logs[date];
                const newStatus = currentStatus === status ? 0 : status;
                
                if (newStatus === 1 && currentStatus !== 1) {
                    coinsChange = 10;
                    if (e) {
                        const rect = e.currentTarget.getBoundingClientRect();
                        const id = Date.now();
                        setFloatingCoins(prev => [...prev, { id, x: rect.left + rect.width / 2, y: rect.top }]);
                        setTimeout(() => setFloatingCoins(prev => prev.filter(c => c.id !== id)), 1000);
                    }
                } else if (currentStatus === 1 && newStatus !== 1) {
                    coinsChange = -10;
                }

                if (newStatus === 1 && !playedSound) {
                  playSuccessSound();
                  playedSound = true;
                  const tempStats = getHabitStats({ ...h, logs: { ...h.logs, [date]: 1 } });
                  if (tempStats.streak > 0 && tempStats.streak % 7 === 0) triggerCelebration();
                }
                return { ...h, logs: { ...h.logs, [date]: newStatus } };
              }
              return h;
            });

            setHabitsByUser({ ...habitsByUser, [activeUserId]: newHabits });
            if (coinsChange !== 0) updateUserCoins(coinsChange);
          };

          const toggleArchive = (habitId) => {
              const newHabits = activeHabits.map(h => h.id === habitId ? { ...h, isArchived: !h.isArchived } : h);
              setHabitsByUser({ ...habitsByUser, [activeUserId]: newHabits });
              showToastMsg('מצב הארכיון עודכן', 'fa-box-archive');
              setActiveView('DASHBOARD');
          };

          const buyReward = (reward) => {
              if ((activeUser.coins || 0) >= reward.cost) {
                  updateUserCoins(-reward.cost);
                  triggerCelebration();
                  showToastMsg(`מזל טוב! רכשת את הפרס: ${reward.title}`, 'fa-gift', 'bg-emerald-600');
              } else {
                  showToastMsg('אין לך מספיק מטבעות כרגע', 'fa-circle-xmark', 'bg-red-500');
              }
          };

          // Drag and Drop Logic
          const handleDragStart = (e, id) => {
              e.dataTransfer.setData('text/plain', id);
              e.currentTarget.style.opacity = '0.4';
          };
          const handleDragEnd = (e) => {
              e.currentTarget.style.opacity = '1';
              e.currentTarget.classList.remove('drag-over');
          };
          const handleDragOver = (e) => {
              e.preventDefault();
              e.currentTarget.classList.add('drag-over');
          };
          const handleDragLeave = (e) => {
              e.currentTarget.classList.remove('drag-over');
          };
          const handleDrop = (e, targetId) => {
              e.preventDefault();
              e.currentTarget.classList.remove('drag-over');
              const draggedId = e.dataTransfer.getData('text/plain');
              if (draggedId === targetId) return;

              const allUserHabits = [...activeHabits];
              const draggedIdx = allUserHabits.findIndex(h => h.id === draggedId);
              const targetIdx = allUserHabits.findIndex(h => h.id === targetId);
              if (draggedIdx === -1 || targetIdx === -1) return;

              const [draggedHabit] = allUserHabits.splice(draggedIdx, 1);
              allUserHabits.splice(targetIdx, 0, draggedHabit);
              
              setHabitsByUser({ ...habitsByUser, [activeUserId]: allUserHabits });
          };

          // Export/Import
          const handleExport = () => {
            const fullData = { users, habitsByUser, rewardsByUser };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(fullData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `habits_backup_${todayStr}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            showToastMsg('הנתונים יוצאו בהצלחה', 'fa-download');
          };

          const handleImport = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const importedData = JSON.parse(event.target.result);
                if (importedData.users && importedData.habitsByUser) {
                  setUsers(importedData.users);
                  setHabitsByUser(importedData.habitsByUser);
                  if (importedData.rewardsByUser) setRewardsByUser(importedData.rewardsByUser);
                  setActiveUserId(importedData.users[0].id);
                  showToastMsg('הנתונים יובאו בהצלחה!', 'fa-upload', 'bg-emerald-600');
                } else { showToastMsg('קובץ לא תקין', 'fa-triangle-exclamation', 'bg-red-500'); }
              } catch (err) { showToastMsg('שגיאה בקריאת הקובץ', 'fa-triangle-exclamation', 'bg-red-500'); }
            };
            reader.readAsText(file);
            e.target.value = null; 
          };

          // --- Views ---
          if (!isLoaded) return null;

          const DashboardView = () => {
              const visibleHabits = activeHabits.filter(h => !h.isArchived);
              const archivedHabits = activeHabits.filter(h => h.isArchived);

              return (
                <div className="space-y-8 animate-in fade-in duration-500">
                  
                  <div className="bg-white dark:bg-slate-800 rounded-2xl p-4 shadow-sm border border-slate-100 dark:border-slate-700 flex items-center gap-4 transition-colors">
                      <div className={`w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center shrink-0 ${smartMessage.color}`}>
                          <i className={`fa-solid ${smartMessage.icon} text-xl`}></i>
                      </div>
                      <div>
                          <h3 className="font-bold text-slate-800 dark:text-slate-200 text-sm opacity-70 mb-1">הודעת מערכת:</h3>
                          <p className="text-slate-700 dark:text-slate-300 font-medium">{smartMessage.text}</p>
                      </div>
                  </div>

                  <section className="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 flex flex-col md:flex-row items-center justify-center gap-8 transition-colors">
                      <div className="flex-1 text-center md:text-right">

                </nav>

                {activeView === 'DASHBOARD' && <DashboardView />}
                {activeView === 'HABIT_DETAIL' && <HabitDetailView />}
                {activeView === 'STORE' && <StoreView />}

                {/* Modals */}
                {isAddingHabit && (
                  <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-white dark:bg-slate-800 w-full max-w-md rounded-3xl shadow-2xl p-8 animate-in zoom-in-95 duration-200 border border-slate-100 dark:border-slate-700">
                      <h2 className="text-2xl font-bold mb-6 text-slate-800 dark:text-white">יצירת הרגל חדש</h2>
                      <form onSubmit={(e) => {
                          e.preventDefault();
                          const id = Date.now().toString();
                          const habitToAdd = { ...newHabit, id, logs: {}, notes: {}, isArchived: false };
                          setHabitsByUser({ ...habitsByUser, [activeUserId]: [...activeHabits, habitToAdd] });
                          setNewHabit({ name: '', startDate: todayStr, endDate: '', goalType: 'total', targetDays: 0 });
                          setIsAddingHabit(false);
                          showToastMsg('הרגל חדש נוצר בהצלחה!', 'fa-seedling', 'bg-emerald-600');
                      }} className="space-y-4">
                        <input type="text" required placeholder="שם ההרגל..." value={newHabit.name} onChange={e => setNewHabit({...newHabit, name: e.target.value})} className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none text-slate-800 dark:text-white"/>
                        <div className="grid grid-cols-2 gap-4">
                            <input type="date" required value={newHabit.startDate} onChange={e => setNewHabit({...newHabit, startDate: e.target.value})} className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none text-slate-800 dark:text-white"/>
                            <input type="date" required value={newHabit.endDate} onChange={e => setNewHabit({...newHabit, endDate: e.target.value})} className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none text-slate-800 dark:text-white"/>
                        </div>
                        <div className="flex gap-3 pt-4">
                          <button type="submit" className="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 active:scale-95 transition-transform">צור הרגל</button>
                          <button type="button" onClick={() => setIsAddingHabit(false)} className="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 py-3 rounded-xl active:scale-95 transition-transform">ביטול</button>
                        </div>
                      </form>
                    </div>
                  </div>
                )}
                
                {showUserModal && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                        <div className="bg-white dark:bg-slate-800 w-full max-w-sm rounded-3xl shadow-2xl p-8 animate-in zoom-in-95 duration-200">
                            <h2 className="text-xl font-bold mb-4 text-slate-800 dark:text-white">פרופיל משתמש חדש</h2>
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const newId = 'user-' + Date.now();
                                setUsers([...users, { id: newId, name: newUserName, avatar: 'fa-user', coins: 0 }]);
                                setHabitsByUser({ ...habitsByUser, [newId]: [] });
                                setRewardsByUser({ ...rewardsByUser, [newId]: defaultRewards });
                                setActiveUserId(newId);
                                setNewUserName('');
                                setShowUserModal(false);
                                showToastMsg(`משתמש חדש נוצר: ${newUserName}`, 'fa-user-check', 'bg-indigo-600');
                            }}>
                                <input type="text" required placeholder="שם המשתמש החדש..." value={newUserName} onChange={e => setNewUserName(e.target.value)} className="w-full p-4 mb-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none text-slate-800 dark:text-white" />
                                <div className="flex gap-3">
                                    <button type="submit" className="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl active:scale-95 transition-transform">שמור</button>
                                    <button type="button" onClick={() => {setShowUserModal(false); setActiveUserId(users[0].id);}} className="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-500 font-bold py-3 rounded-xl active:scale-95 transition-transform">ביטול</button>
                                </div>
                            </form>
                        </div>
                    </div>
                )}
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
